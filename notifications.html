<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - SellerHub Seller</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="https://images.unsplash.com/photo-1572025442646-866d16c84a54?w=60&h=60&fit=crop" alt="SellerHub" class="rounded">
      <span>SellerHub</span>
    </div>
    <nav class="nav flex-column mt-3">
      <a class="nav-link" href="dashboard.html">
        <i class="bi bi-grid-1x2"></i> Dashboard
      </a>
      <a class="nav-link" href="products.html">
        <i class="bi bi-box-seam"></i> Products
      </a>
      <a class="nav-link" href="orders.html">
        <i class="bi bi-cart3"></i> Orders
      </a>
      <a class="nav-link" href="storefront.html">
        <i class="bi bi-shop"></i> Storefront
      </a>
      <a class="nav-link" href="analytics.html">
        <i class="bi bi-bar-chart-line"></i> Analytics
      </a>
      <a class="nav-link active" href="notifications.html">
        <i class="bi bi-bell"></i> Notifications
      </a>
      <a class="nav-link" href="settings.html">
        <i class="bi bi-gear"></i> Settings
      </a>
    </nav>
    <div class="mt-auto p-3">
      <button class="btn btn-outline-light w-100" onclick="logout()">
        <i class="bi bi-box-arrow-left me-2"></i>Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Header -->
    <header class="top-header d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center">
        <button class="btn btn-outline-secondary me-3 d-lg-none" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>
        <h1 class="h4 mb-0">Notifications</h1>
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-outline-primary" onclick="markAllRead()">
          <i class="bi bi-check-all me-1"></i> Mark All Read
        </button>
      </div>
    </header>

    <!-- Notifications Content -->
    <div class="container-fluid p-4">
      <!-- Filter Tabs -->
      <ul class="nav nav-tabs mb-4">
        <li class="nav-item">
          <a class="nav-link active" href="#" data-filter="all">All Notifications</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-filter="unread">Unread <span class="badge bg-primary ms-1">3</span></a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-filter="orders">Orders</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-filter="payments">Payments</a>
        </li>
      </ul>

      <!-- Notifications List -->
      <div id="notificationsList">
        <!-- Notifications will be rendered by JavaScript -->
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme-loader.js"></script>
  <script src="js/app.js"></script>
  <script>
    function markAllRead() {
      MOCK_NOTIFICATIONS.forEach(n => n.read = true);
      const activeTab = document.querySelector('[data-filter].active');
      const currentFilter = activeTab ? activeTab.dataset.filter : 'all';
      renderNotifications(currentFilter);
      updateNotificationBadge();
      showToast('All notifications marked as read', 'success');
    }
  </script>
</body>
</html>
