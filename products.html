<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="https://images.unsplash.com/photo-1572025442646-866d16c84a54?w=32&h=32&fit=crop">
  <title>Products - SellerHub Seller</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="https://images.unsplash.com/photo-1572025442646-866d16c84a54?w=60&h=60&fit=crop" alt="SellerHub" class="rounded">
      <span>SellerHub</span>
    </div>
    <nav class="nav flex-column mt-3">
      <a class="nav-link" href="dashboard.html">
        <i class="bi bi-grid-1x2"></i> Dashboard
      </a>
      <a class="nav-link active" href="products.html">
        <i class="bi bi-box-seam"></i> Products
      </a>
      <a class="nav-link" href="orders.html">
        <i class="bi bi-cart3"></i> Orders
      </a>
      <a class="nav-link" href="storefront.html">
        <i class="bi bi-shop"></i> Storefront
      </a>
      <a class="nav-link" href="analytics.html">
        <i class="bi bi-bar-chart-line"></i> Analytics
      </a>
      <a class="nav-link" href="notifications.html">
        <i class="bi bi-bell"></i> Notifications
      </a>
      <a class="nav-link" href="contact-support.html">
        <i class="bi bi-envelope"></i> Contact Support
      </a>
      <a class="nav-link" href="settings.html">
        <i class="bi bi-gear"></i> Settings
      </a>
    </nav>
    <div class="mt-auto p-3">
      <button class="btn btn-outline-light w-100" onclick="logout()">
        <i class="bi bi-box-arrow-left me-2"></i>Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Header -->
    <header class="top-header d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center">
        <button class="btn btn-outline-secondary me-3 d-lg-none" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>
        <h1 class="h4 mb-0">Products</h1>
      </div>
      <div class="d-flex align-items-center gap-3">
        <a href="add-product.html" class="btn btn-primary">
          <i class="bi bi-plus-lg me-1"></i> Add Product
        </a>
      </div>
    </header>

    <!-- Products Content -->
    <div class="container-fluid p-4">
      <!-- Filters -->
      <div class="row mb-4">
        <div class="col-md-4 mb-3 mb-md-0">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" placeholder="Search products..." id="searchInput" oninput="searchProducts(this.value)">
          </div>
        </div>
        <div class="col-md-3">
          <select class="form-select" id="categoryFilter" onchange="filterProducts(this.value)">
            <option value="all">All Categories</option>
            <option value="Electronics">Electronics</option>
            <option value="Fashion">Fashion</option>
            <option value="Home & Living">Home & Living</option>
            <option value="Food & Beverages">Food & Beverages</option>
            <option value="Beauty">Beauty</option>
            <option value="Sports & Fitness">Sports & Fitness</option>
          </select>
        </div>
        <div class="col-md-3">
          <select class="form-select">
            <option>All Status</option>
            <option>Active</option>
            <option>Inactive</option>
            <option>Out of Stock</option>
          </select>
        </div>
        <div class="col-md-2">
          <div class="btn-group w-100">
            <button class="btn btn-outline-secondary active" id="gridViewBtn">
              <i class="bi bi-grid-3x3-gap"></i>
            </button>
            <button class="btn btn-outline-secondary" id="listViewBtn">
              <i class="bi bi-list-ul"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Products Grid -->
      <div class="row" id="productsGrid">
        <!-- Products will be rendered by JavaScript -->
      </div>

      <!-- Pagination -->
      <div class="d-flex justify-content-between align-items-center mt-4">
        <div class="text-muted">
          Showing 1-10 of 48 products
        </div>
        <nav>
          <ul class="pagination mb-0">
            <li class="page-item disabled">
              <a class="page-link" href="#"><i class="bi bi-chevron-left"></i></a>
            </li>
            <li class="page-item active"><a class="page-link" href="#">1</a></li>
            <li class="page-item"><a class="page-link" href="#">2</a></li>
            <li class="page-item"><a class="page-link" href="#">3</a></li>
            <li class="page-item"><a class="page-link" href="#">4</a></li>
            <li class="page-item"><a class="page-link" href="#">5</a></li>
            <li class="page-item">
              <a class="page-link" href="#"><i class="bi bi-chevron-right"></i></a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme-loader.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
