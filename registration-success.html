<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="https://images.unsplash.com/photo-1572025442646-866d16c84a54?w=32&h=32&fit=crop">
  <title>Registration Successful - SellerHub Seller</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
      padding: 1rem;
    }
    .auth-card {
      max-width: 420px;
      width: 100%;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }
    .auth-card .card-body {
      padding: 2.5rem;
      text-align: center;
    }
    .icon-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background-color: #dcfce7;
      color: #16a34a;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.75rem;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="card auth-card">
      <div class="card-body">
        <div class="icon-circle">
          <i class="bi bi-check-lg"></i>
        </div>

        <h4 class="fw-bold mb-2">Registration Successful!</h4>

        <p class="text-muted mb-4">
          Your seller account has been created successfully. You can now access your dashboard and start managing your store.
        </p>

        <a href="login.html" class="btn btn-primary w-100 py-2 fw-medium">
          Continue to Login
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme-loader.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.scrollTo(0, 0);
  </script>
</body>
</html>
