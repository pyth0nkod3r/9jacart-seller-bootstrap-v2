<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - SellerHub Seller</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="https://images.unsplash.com/photo-1572025442646-866d16c84a54?w=60&h=60&fit=crop" alt="SellerHub" class="rounded">
      <span>SellerHub</span>
    </div>
    <nav class="nav flex-column mt-3">
      <a class="nav-link" href="dashboard.html">
        <i class="bi bi-grid-1x2"></i> Dashboard
      </a>
      <a class="nav-link" href="products.html">
        <i class="bi bi-box-seam"></i> Products
      </a>
      <a class="nav-link active" href="orders.html">
        <i class="bi bi-cart3"></i> Orders
      </a>
      <a class="nav-link" href="storefront.html">
        <i class="bi bi-shop"></i> Storefront
      </a>
      <a class="nav-link" href="analytics.html">
        <i class="bi bi-bar-chart-line"></i> Analytics
      </a>
      <a class="nav-link" href="notifications.html">
        <i class="bi bi-bell"></i> Notifications
      </a>
      <a class="nav-link" href="contact-support.html">
        <i class="bi bi-envelope"></i> Contact Support
      </a>
      <a class="nav-link" href="settings.html">
        <i class="bi bi-gear"></i> Settings
      </a>
    </nav>
    <div class="mt-auto p-3">
      <button class="btn btn-outline-light w-100" onclick="logout()">
        <i class="bi bi-box-arrow-left me-2"></i>Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Header -->
    <header class="top-header d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center">
        <button class="btn btn-outline-secondary me-3 d-lg-none" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>
        <h1 class="h4 mb-0">Orders</h1>
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-outline-primary">
          <i class="bi bi-download me-1"></i> Export
        </button>
      </div>
    </header>

    <!-- Orders Content -->
    <div class="container-fluid p-4">
      <!-- Stats Row -->
      <div class="row mb-4">
        <div class="col-md-3 col-6 mb-3">
          <div class="card border-0 shadow-sm">
            <div class="card-body text-center">
              <div class="display-6 fw-bold" style="color: var(--primary-color);">156</div>
              <small class="text-muted">Total Orders</small>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6 mb-3">
          <div class="card border-0 shadow-sm">
            <div class="card-body text-center">
              <div class="display-6 fw-bold text-warning">12</div>
              <small class="text-muted">Pending</small>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6 mb-3">
          <div class="card border-0 shadow-sm">
            <div class="card-body text-center">
              <div class="display-6 fw-bold text-info">8</div>
              <small class="text-muted">Processing</small>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6 mb-3">
          <div class="card border-0 shadow-sm">
            <div class="card-body text-center">
              <div class="display-6 fw-bold text-success">128</div>
              <small class="text-muted">Delivered</small>
            </div>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="row mb-4">
        <div class="col-md-4 mb-3 mb-md-0">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" placeholder="Search orders...">
          </div>
        </div>
        <div class="col-md-3">
          <select class="form-select" id="statusFilter" onchange="filterOrders(this.value)">
            <option value="all">All Status</option>
            <option value="pending">Pending</option>
            <option value="processing">Processing</option>
            <option value="shipped">Shipped</option>
            <option value="delivered">Delivered</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div class="col-md-3">
          <input type="date" class="form-control">
        </div>
        <div class="col-md-2">
          <button class="btn btn-outline-secondary w-100">
            <i class="bi bi-funnel me-1"></i> More Filters
          </button>
        </div>
      </div>

      <!-- Orders Table -->
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>Order ID</th>
                  <th>Customer</th>
                  <th>Items</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="ordersTable">
                <!-- Orders will be rendered by JavaScript -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Pagination -->
      <div class="d-flex justify-content-between align-items-center mt-4">
        <div class="text-muted">
          Showing 1-8 of 156 orders
        </div>
        <nav>
          <ul class="pagination mb-0">
            <li class="page-item disabled">
              <a class="page-link" href="#"><i class="bi bi-chevron-left"></i></a>
            </li>
            <li class="page-item active"><a class="page-link" href="#">1</a></li>
            <li class="page-item"><a class="page-link" href="#">2</a></li>
            <li class="page-item"><a class="page-link" href="#">3</a></li>
            <li class="page-item">
              <a class="page-link" href="#"><i class="bi bi-chevron-right"></i></a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </main>

  <!-- Order Modal -->
  <div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Order Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="orderModalBody">
          <!-- Order details will be rendered by JavaScript -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary">Update Status</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme-loader.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
