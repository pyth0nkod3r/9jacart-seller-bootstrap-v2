<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="https://images.unsplash.com/photo-1572025442646-866d16c84a54?w=32&h=32&fit=crop">
  <title>Login - SellerHub Seller</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
    }
    .login-card {
      max-width: 420px;
      width: 100%;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .login-card .card-body {
      padding: 2.5rem;
    }
    .brand-logo {
      width: 60px;
      height: 60px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="card login-card">
      <div class="card-body">
        <div class="text-center mb-4">
          <img src="https://images.unsplash.com/photo-1572025442646-866d16c84a54?w=100&h=100&fit=crop" alt="SellerHub" class="brand-logo mb-3">
          <h4 class="fw-bold">SellerHub</h4>
          <p class="text-muted">Sign in to your seller account</p>
        </div>

        <form id="loginForm">
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" id="email" placeholder="seller@sellerhub.com" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
              <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="remember">
              <label class="form-check-label" for="remember">Remember me</label>
            </div>
            <a href="forgot-password.html" class="text-decoration-none" style="color: var(--primary-color);">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign in
          </button>

          <div class="text-center">
            <span class="text-muted">Don't have an account?</span>
            <a href="register.html" class="text-decoration-none ms-1" style="color: var(--primary-color);">Create account</a>
          </div>
        </form>

        <hr class="my-4">

        <div class="text-center mb-3">
          <div class="alert alert-info py-2 px-3 small mb-0">
            <i class="bi bi-info-circle me-1"></i> <strong>Demo Mode:</strong> Enter any email and password to sign in.
          </div>
        </div>

        <div class="text-center">
          <a href="index.html" class="text-muted text-decoration-none small">
            <i class="bi bi-arrow-left me-1"></i>Back to Home
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme-loader.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
      const password = document.getElementById('password');
      const icon = this.querySelector('i');
      if (password.type === 'password') {
        password.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
      } else {
        password.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
      }
    });
  </script>
</body>
</html>
