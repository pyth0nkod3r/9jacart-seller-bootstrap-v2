<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="https://images.unsplash.com/photo-1572025442646-866d16c84a54?w=32&h=32&fit=crop">
  <title>Product Details - SellerHub Seller</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="https://images.unsplash.com/photo-1572025442646-866d16c84a54?w=60&h=60&fit=crop" alt="SellerHub" class="rounded">
      <span>SellerHub</span>
    </div>
    <nav class="nav flex-column mt-3">
      <a class="nav-link" href="dashboard.html">
        <i class="bi bi-grid-1x2"></i> Dashboard
      </a>
      <a class="nav-link active" href="products.html">
        <i class="bi bi-box-seam"></i> Products
      </a>
      <a class="nav-link" href="orders.html">
        <i class="bi bi-cart3"></i> Orders
      </a>
      <a class="nav-link" href="storefront.html">
        <i class="bi bi-shop"></i> Storefront
      </a>
      <a class="nav-link" href="analytics.html">
        <i class="bi bi-bar-chart-line"></i> Analytics
      </a>
      <a class="nav-link" href="notifications.html">
        <i class="bi bi-bell"></i> Notifications
        <span class="badge bg-danger ms-auto" id="sidebarNotificationBadge">3</span>
      </a>
      <a class="nav-link" href="contact-support.html">
        <i class="bi bi-envelope"></i> Contact Support
      </a>
      <a class="nav-link" href="settings.html">
        <i class="bi bi-gear"></i> Settings
      </a>
    </nav>
    <div class="mt-auto p-3">
      <button class="btn btn-outline-light w-100" onclick="logout()">
        <i class="bi bi-box-arrow-left me-2"></i>Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Header -->
    <header class="top-header d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center">
        <button class="btn btn-outline-secondary me-3 d-lg-none" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>
        <div>
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
              <li class="breadcrumb-item"><a href="products.html">Products</a></li>
              <li class="breadcrumb-item active" id="productCrumb">Product Details</li>
            </ol>
          </nav>
        </div>
      </div>
    </header>

    <!-- Content -->
    <div class="container-fluid p-4">
      <!-- Loading state -->
      <div id="productLoading" class="text-center py-5">
        <div class="spinner-border" role="status" style="color: var(--primary-color);">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <!-- Not found state -->
      <div id="productNotFound" class="text-center py-5 d-none">
        <p class="text-muted mb-3">Product not found</p>
        <a href="products.html" class="text-decoration-none" style="color: var(--primary-color);">Back to Products</a>
      </div>

      <!-- Detail view -->
      <div id="productDetail" class="d-none">
        <div class="card border">
          <div class="card-body p-4">
            <div class="row g-4">
              <!-- Image -->
              <div class="col-md-6">
                <img id="pdImage" src="https://placehold.co/400x400/e5e7eb/9ca3af?text=No+Image" alt="" class="img-fluid rounded w-100">
              </div>

              <!-- Info -->
              <div class="col-md-6">
                <h1 class="h3 fw-bold mb-3" id="pdName"></h1>
                <p class="text-muted" id="pdDescription"></p>

                <div class="row g-3 py-3 border-top border-bottom my-3">
                  <div class="col-6">
                    <p class="text-muted small mb-1">Price</p>
                    <p class="h4 fw-bold mb-0" id="pdPrice">₦0</p>
                  </div>
                  <div class="col-6">
                    <p class="text-muted small mb-1">Stock</p>
                    <p class="h4 fw-bold mb-0" id="pdStock">0</p>
                  </div>
                </div>

                <div class="d-flex flex-wrap gap-2">
                  <a href="edit-product.html" id="pdEditBtn" class="btn btn-primary">
                    Edit Product
                  </a>
                  <button class="btn btn-outline-secondary" id="pdToggleStatusBtn">
                    Deactivate
                  </button>
                  <button class="btn btn-outline-danger" id="pdDeleteBtn">
                    Delete
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Delete Confirmation Modal -->
  <div class="modal fade" id="deleteConfirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Delete Product</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted mb-0">Are you sure you want to delete this product?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme-loader.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const loadingEl = document.getElementById('productLoading');
      const notFoundEl = document.getElementById('productNotFound');
      const detailEl = document.getElementById('productDetail');

      // Resolve product id from query string (?id=...)
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');

      // Demo data source: read sampleProducts from app.js if exposed, else use a small fallback.
      const fallback = [
        {
          productId: '1',
          productName: 'Premium Wireless Headphones',
          productDescription: 'High-quality wireless headphones with noise cancellation and premium audio drivers.',
          unitPrice: '45000',
          stock: '24',
          isActive: '1',
          images: ['https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600&h=600&fit=crop']
        }
      ];
      const products = (window.sampleProducts && window.sampleProducts.length) ? window.sampleProducts : fallback;
      const product = productId ? products.find((p) => String(p.productId) === String(productId)) : products[0];

      setTimeout(function () {
        loadingEl.classList.add('d-none');
        if (!product) {
          notFoundEl.classList.remove('d-none');
          return;
        }

        document.getElementById('productCrumb').textContent = product.productName;
        document.getElementById('pdName').textContent = product.productName;
        document.getElementById('pdDescription').textContent = product.productDescription || '';
        document.getElementById('pdImage').src = (product.images && product.images[0]) || 'https://placehold.co/400x400/e5e7eb/9ca3af?text=No+Image';
        document.getElementById('pdImage').alt = product.productName;
        document.getElementById('pdPrice').textContent = '₦' + Number(product.unitPrice || 0).toLocaleString();
        document.getElementById('pdStock').textContent = product.stock;

        const isActive = String(product.isActive) === '1' || product.isActive === true;
        const toggleBtn = document.getElementById('pdToggleStatusBtn');
        toggleBtn.textContent = isActive ? 'Deactivate' : 'Activate';
        toggleBtn.addEventListener('click', function () {
          const next = !isActive;
          if (typeof showToast === 'function') {
            showToast('Product ' + (next ? 'activated' : 'deactivated') + ' successfully', 'success');
          }
        });

        document.getElementById('pdEditBtn').href = 'edit-product.html?id=' + encodeURIComponent(product.productId);

        const deleteModal = new bootstrap.Modal(document.getElementById('deleteConfirmModal'));
        document.getElementById('pdDeleteBtn').addEventListener('click', () => deleteModal.show());
        document.getElementById('confirmDeleteBtn').addEventListener('click', function () {
          deleteModal.hide();
          if (typeof showToast === 'function') {
            showToast('Product deleted successfully', 'success');
          }
          setTimeout(function () {
            window.location.href = 'products.html';
          }, 600);
        });

        detailEl.classList.remove('d-none');
      }, 300);
    });
  </script>
</body>
</html>
