<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="https://images.unsplash.com/photo-1572025442646-866d16c84a54?w=32&h=32&fit=crop">
  <title>Register - SellerHub Seller</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    .register-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
      padding: 2rem 0;
    }
    .register-card {
      max-width: 600px;
      width: 100%;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .register-card .card-body {
      padding: 2.5rem;
    }
    .brand-logo {
      width: 60px;
      height: 60px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="card register-card">
      <div class="card-body">
        <div class="text-center mb-4">
          <img src="https://images.unsplash.com/photo-1572025442646-866d16c84a54?w=100&h=100&fit=crop" alt="SellerHub" class="brand-logo mb-3">
          <h4 class="fw-bold">Become a Seller</h4>
          <p class="text-muted">Create your seller account and start selling today</p>
        </div>

        <form id="registerForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">First Name *</label>
              <input type="text" class="form-control" placeholder="John" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Last Name *</label>
              <input type="text" class="form-control" placeholder="Doe" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Email Address *</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" placeholder="you@example.com" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Phone Number *</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-telephone"></i></span>
              <input type="tel" class="form-control" placeholder="+234 800 123 4567" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Store Name *</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-shop"></i></span>
              <input type="text" class="form-control" placeholder="Your store name" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Business Category *</label>
            <select class="form-select" required>
              <option value="">Select category</option>
              <option>Electronics</option>
              <option>Fashion</option>
              <option>Home & Living</option>
              <option>Food & Beverages</option>
              <option>Beauty</option>
              <option>Sports & Fitness</option>
              <option>General Merchandise</option>
            </select>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Password *</label>
              <input type="password" class="form-control" placeholder="Min. 8 characters" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Confirm Password *</label>
              <input type="password" class="form-control" placeholder="Confirm password" required>
            </div>
          </div>

          <div class="mb-4">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="terms" required>
              <label class="form-check-label" for="terms">
                I agree to the <a href="terms.html" style="color: var(--primary-color);">Terms of Service</a> and <a href="privacy.html" style="color: var(--primary-color);">Privacy Policy</a>
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
            <i class="bi bi-person-plus me-2"></i>Create Account
          </button>

          <div class="text-center">
            <span class="text-muted">Already have an account?</span>
            <a href="login.html" class="text-decoration-none ms-1" style="color: var(--primary-color);">Sign in</a>
          </div>
        </form>

        <hr class="my-4">

        <div class="text-center">
          <a href="index.html" class="text-muted text-decoration-none small">
            <i class="bi bi-arrow-left me-1"></i>Back to Home
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme-loader.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = this.querySelector('button[type="submit"]');
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';
      }
      showToast('Account created successfully! Redirecting to dashboard...', 'success');
      // Auto-login and redirect to dashboard
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('userName', 'Demo Seller');
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1500);
    });
  </script>
</body>
</html>
