<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="https://images.unsplash.com/photo-1572025442646-866d16c84a54?w=32&h=32&fit=crop">
  <title>Forgot Password - SellerHub Seller</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
      padding: 1rem;
    }
    .auth-card {
      max-width: 420px;
      width: 100%;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }
    .auth-card .card-body {
      padding: 2.5rem;
    }
    .brand-logo {
      width: 60px;
      height: 60px;
      border-radius: 12px;
    }
    .icon-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon-circle.icon-info {
      background-color: #dbeafe;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="card auth-card">
      <div class="card-body">
        <!-- Form view -->
        <div id="forgotFormView">
          <div class="text-center mb-4">
            <a href="index.html" class="text-decoration-none">
              <img src="https://images.unsplash.com/photo-1572025442646-866d16c84a54?w=100&h=100&fit=crop" alt="SellerHub" class="brand-logo mb-3">
              <h4 class="fw-bold" style="color: var(--primary-color);">SellerHub</h4>
            </a>
            <p class="text-muted">Reset your password</p>
          </div>

          <div class="alert alert-danger d-none" id="forgotError" role="alert"></div>

          <form id="forgotPasswordForm">
            <div class="mb-4">
              <label for="forgotEmail" class="form-label">Email Address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="forgotEmail" placeholder="you@example.com" required>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="forgotSubmitBtn">
              Send Reset Code
            </button>
          </form>

          <div class="text-center">
            <a href="login.html" class="text-decoration-none small" style="color: var(--primary-color);">
              <i class="bi bi-arrow-left me-1"></i>Back to login
            </a>
          </div>
        </div>

        <!-- Success view -->
        <div id="forgotSuccessView" class="text-center d-none">
          <div class="icon-circle icon-info">
            <i class="bi bi-envelope-check fs-2"></i>
          </div>
          <h4 class="fw-bold mb-2">Check Your Email</h4>
          <p class="text-muted mb-4">
            We've sent a verification code to <strong id="forgotSuccessEmail"></strong>.
            Please check your inbox and follow the instructions to reset your password.
          </p>
          <a href="reset-password.html" class="btn btn-primary w-100 py-2 mb-3">
            Enter Reset Code
          </a>
          <a href="login.html" class="text-decoration-none small" style="color: var(--primary-color);">
            <i class="bi bi-arrow-left me-1"></i>Back to login
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme-loader.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('forgotPasswordForm');
      const formView = document.getElementById('forgotFormView');
      const successView = document.getElementById('forgotSuccessView');
      const successEmail = document.getElementById('forgotSuccessEmail');
      const btn = document.getElementById('forgotSubmitBtn');
      const errorAlert = document.getElementById('forgotError');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        errorAlert.classList.add('d-none');
        const email = document.getElementById('forgotEmail').value.trim();
        if (!email) return;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sending...';

        // Simulate API call
        setTimeout(function () {
          // Persist for reset-password.html to read
          try {
            sessionStorage.setItem('sellerhub-reset-identifier', email);
            sessionStorage.setItem('sellerhub-reset-verification-id', 'demo-' + Date.now());
          } catch (_) {}

          successEmail.textContent = email;
          formView.classList.add('d-none');
          successView.classList.remove('d-none');
          btn.disabled = false;
          btn.innerHTML = 'Send Reset Code';
        }, 800);
      });
    });
  </script>
</body>
</html>
